<!DOCTYPE html>
<html lang="en" data-theme="light" data-accent="teal">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); font-family: var(--font-body); }
  .section { margin-bottom: 20px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 8px; }
  .swatches { display: flex; gap: 4px; }
  .swatch { flex: 1; height: 48px; border-radius: 6px; position: relative; cursor: default; }
  .swatch-label { position: absolute; bottom: 4px; left: 0; right: 0; text-align: center; font-size: 9px; font-weight: 600; }
  .light-text .swatch-label { color: rgba(255,255,255,0.85); }
  .dark-text .swatch-label { color: rgba(0,0,0,0.55); }
  .brand-row { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
  .brand-chip { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 24px; border: 1px solid var(--border); background: var(--surface); box-shadow: var(--shadow-sm); }
  .brand-dot { width: 20px; height: 20px; border-radius: 50%; }
  .brand-info { font-size: 12px; line-height: 1.3; }
  .brand-name { font-weight: 600; color: var(--fg); }
  .brand-val { color: var(--fg-muted); font-size: 10px; }
</style>
</head>
<body>
<div class="brand-row">
  <div class="brand-chip">
    <div class="brand-dot" style="background: oklch(0.72 0.17 208);"></div>
    <div class="brand-info">
      <div class="brand-name">Teal (Primary)</div>
      <div class="brand-val">oklch(0.72 0.17 208)</div>
    </div>
  </div>
  <div class="brand-chip">
    <div class="brand-dot" style="background: oklch(0.80 0.18 84);"></div>
    <div class="brand-info">
      <div class="brand-name">Gold (Secondary)</div>
      <div class="brand-val">oklch(0.80 0.18 84)</div>
    </div>
  </div>
</div>

<div class="section">
  <div class="label">Shollu Teal</div>
  <div class="swatches">
    <div class="swatch dark-text" style="background:var(--shollu-50)"><span class="swatch-label">50</span></div>
    <div class="swatch dark-text" style="background:var(--shollu-100)"><span class="swatch-label">100</span></div>
    <div class="swatch dark-text" style="background:var(--shollu-200)"><span class="swatch-label">200</span></div>
    <div class="swatch dark-text" style="background:var(--shollu-300)"><span class="swatch-label">300</span></div>
    <div class="swatch dark-text" style="background:var(--shollu-400)"><span class="swatch-label">400</span></div>
    <div class="swatch light-text" style="background:var(--shollu-500)"><span class="swatch-label">500</span></div>
    <div class="swatch light-text" style="background:var(--shollu-600)"><span class="swatch-label">600</span></div>
    <div class="swatch light-text" style="background:var(--shollu-700)"><span class="swatch-label">700</span></div>
    <div class="swatch light-text" style="background:var(--shollu-800)"><span class="swatch-label">800</span></div>
    <div class="swatch light-text" style="background:var(--shollu-900)"><span class="swatch-label">900</span></div>
    <div class="swatch light-text" style="background:var(--shollu-950)"><span class="swatch-label">950</span></div>
  </div>
</div>

<div class="section">
  <div class="label">Gold (Secondary)</div>
  <div class="swatches">
    <div class="swatch dark-text" style="background:var(--gold-50)"><span class="swatch-label">50</span></div>
    <div class="swatch dark-text" style="background:var(--gold-100)"><span class="swatch-label">100</span></div>
    <div class="swatch dark-text" style="background:var(--gold-200)"><span class="swatch-label">200</span></div>
    <div class="swatch dark-text" style="background:var(--gold-300)"><span class="swatch-label">300</span></div>
    <div class="swatch dark-text" style="background:var(--gold-400)"><span class="swatch-label">400</span></div>
    <div class="swatch dark-text" style="background:var(--gold-500)"><span class="swatch-label">500</span></div>
    <div class="swatch light-text" style="background:var(--gold-600)"><span class="swatch-label">600</span></div>
    <div class="swatch light-text" style="background:var(--gold-700)"><span class="swatch-label">700</span></div>
    <div class="swatch light-text" style="background:var(--gold-800)"><span class="swatch-label">800</span></div>
    <div class="swatch light-text" style="background:var(--gold-900)"><span class="swatch-label">900</span></div>
    <div class="swatch light-text" style="background:var(--gold-950)"><span class="swatch-label">950</span></div>
  </div>
</div>
</body>
</html>
