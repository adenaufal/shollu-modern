name: Feature Request
description: Propose a new feature or improvement for Shollu Modern.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ### Have an idea to make Shollu Modern even better?
        We would love to hear it! Please outline your request below.

  - type: textarea
    id: behavior
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is. E.g., I'm always frustrated when...
      placeholder: Describe the problem...
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Describe the Solution
      description: A clear and concise description of what you want to happen.
      placeholder: I would like the app to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe Alternatives Checked
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: E.g., using command tasks instead of custom audio...
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context or screenshots about the feature request here.
      placeholder: E.g. screenshots of original Shollu v3 features...
